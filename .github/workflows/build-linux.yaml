name: Build Linux

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        default: ${{ github.ref_name }}
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build for Linux"
    permissions: write-all
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Create secrets
        run: echo "$SECRETS" | base64 -di > secrets.env
        env:
          SECRETS: ${{ secrets.SECRETS }}
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/package-list.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            clang cmake \
            libgtk-3-dev \
            ninja-build \
            libstdc++-12-dev \
            liblzma-dev \
            unzip \
            libcurl4-openssl-dev \
            libasound2-dev \
            libmpv-dev \
            mpv
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - run: flutter --version
      - name: Build Flutter for Linux
        run: flutter build linux --dart-define-from-file=secrets.env
      - name: Upload linux outputs
        uses: actions/upload-artifact@v4
        with:
          name: linux-outputs
          path: build/linux/x64/release/bundle/
          retention-days: 7
